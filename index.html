<script>
const API_KEY = "ТВОЙ_API_КЛЮЧ";

function urlToBase64(url) {
    return btoa(url)
        .replace(/=/g, "")
        .replace(/\+/g, "-")
        .replace(/\//g, "_");
}

async function checkUrl() {
    let url = document.getElementById("url").value.trim();
    let resultDiv = document.getElementById("result");

    if (!url) {
        resultDiv.innerHTML = '<div class="result danger">Введите ссылку!</div>';
        return;
    }

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    resultDiv.innerHTML = '<div class="result loading">Проверка...</div>';

    try {
        let encodedUrl = urlToBase64(url);

        let response = await fetch(`https://www.virustotal.com/api/v3/urls/${encodedUrl}`, {
            method: "GET",
            headers: {
                "x-apikey": API_KEY
            }
        });

        if (!response.ok) {
            throw new Error("API error");
        }

        let data = await response.json();
        let stats = data.data.attributes.last_analysis_stats;

        if (stats.malicious > 0 || stats.suspicious > 2) {
            resultDiv.innerHTML = '<div class="result danger">ОПАСНО!</div>';
        } else {
            resultDiv.innerHTML = '<div class="result safe">БЕЗОПАСНО</div>';
        }

    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = '<div class="result danger">Ошибка проверки</div>';
    }
}
</script>
